<script>
// Load products dynamically from ProductCatalog
async function loadProducts(productsToLoad = null) {
  const productGrid = document.getElementById('productGrid');
  
  // First load products from Supabase if not provided
  if (!productsToLoad) {
    await ProductCatalog.getAll();
  }
  
  const products = productsToLoad || ProductCatalog.getAvailable();
  
  if (products.length === 0) {
    productGrid.innerHTML = '<p class="placeholder">No products currently available.</p>';
    return;
  }
  
  productGrid.innerHTML = products.map(product => {
    return `
    <div class="piece">
      <div class="piece-visual">
        <img src="${product.image_url}" alt="${product.name}" loading="lazy">
      </div>
      <div class="piece-info">
        <div class="piece-category">${product.category || 'Sculpture'}</div>
        <div class="piece-name serif">${product.name}</div>
        <div class="piece-description">${product.description || ''}</div>
        <div class="piece-price">
          <span>${new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR' }).format(product.price)}</span>
        </div>
        <button class="add-to-cart" 
                data-product-id="${product.id}" 
                data-product-name="${product.name}" 
                data-product-price="${product.price}" 
                data-product-image="${product.image}"
                ${product.stock === 0 ? 'disabled' : ''}>
          ${product.stock > 0 ? 'Ajouter au panier' : 'Rupture de stock'}
        </button>
      </div>
    </div>
  `;
  }).join('');
  
  // Re-attach event listeners to new add-to-cart buttons
  document.querySelectorAll('.add-to-cart').forEach(button => {
    button.addEventListener('click', function() {
      const productId = this.dataset.productId;
      const productName = this.dataset.productName;
      const productPrice = parseFloat(this.dataset.productPrice);
      const productImage = this.dataset.productImage;
      window.shoppingCart.addToCart(productId, productName, productPrice, productImage);
    });
  });
  
  // Update wishlist button states
  updateWishlistButtonStates();
}

// Toggle wishlist
function toggleWishlist(button) {
  const productId = button.dataset.productId;
  const productName = button.dataset.productName;
  const productPrice = parseFloat(button.dataset.productPrice);
  const productImage = button.dataset.productImage;
  
  if (typeof WishlistService !== 'undefined') {
    if (WishlistService.isInWishlist(productId)) {
      WishlistService.removeFromWishlist(productId);
      button.textContent = '♡';
      button.classList.remove('active');
    } else {
      WishlistService.addToWishlist(productId, productName, productPrice, productImage);
      button.textContent = '♥';
      button.classList.add('active');
    }
  }
}

// Update wishlist button states on page load
function updateWishlistButtonStates() {
  if (typeof WishlistService !== 'undefined') {
    document.querySelectorAll('.wishlist-btn').forEach(button => {
      const productId = button.dataset.productId;
      if (WishlistService.isInWishlist(productId)) {
        button.textContent = '♥';
        button.classList.add('active');
      } else {
        button.textContent = '♡';
        button.classList.remove('active');
      }
    });
    
    WishlistService.updateWishlistCount();
  }
}

// Load dynamic reviews for collection page
function loadCollectionReviews() {
  const allReviews = JSON.parse(localStorage.getItem('fl_productReviews')) || {};
  const approvedReviews = [];
  
  // Get all approved reviews from all products
  Object.keys(allReviews).forEach(productId => {
    const productReviews = allReviews[productId];
    productReviews.forEach(review => {
      if (review.status === 'approved') {
        approvedReviews.push({
          ...review,
          productId
        });
      }
    });
  });
  
  const reviewsGrid = document.getElementById('collectionReviews');
  
  if (approvedReviews.length === 0) {
    reviewsGrid.innerHTML = `
      <div class="review-card">
        <div class="review-stars">★★★★★</div>
        <p class="review-text">"Artisanat exceptionnel. La pièce en bronze que j'ai achetée a dépassé toutes mes attentes. L'attention aux détails est remarquable."</p>
        <div class="review-author">
          <strong>Sophie M.</strong>
          <span class="review-date">Paris, France</span>
        </div>
      </div>
      <div class="review-card">
        <div class="review-stars">★★★★★</div>
        <p class="review-text">"Un ajout magnifique à ma collection. La sculpture est arrivée parfaitement emballée et la communication tout au long du processus a été excellente."</p>
        <div class="review-author">
          <strong>James K.</strong>
          <span class="review-date">Londres, Royaume-Uni</span>
        </div>
      </div>
      <div class="review-card">
        <div class="review-stars">★★★★☆</div>
        <p class="review-text">"Une belle œuvre d'art. La sculpture en pierre a une présence merveilleuse dans mon espace d'exposition. Hautement recommandé."</p>
        <div class="review-author">
          <strong>Maria L.</strong>
          <span class="review-date">Milan, Italie</span>
        </div>
      </div>
    `;
    return;
  }
  
  // Show up to 3 most recent approved reviews
  const recentReviews = approvedReviews
    .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt))
    .slice(0, 3);
  
  reviewsGrid.innerHTML = recentReviews.map(review => {
    const stars = '★'.repeat(review.rating) + '☆'.repeat(5 - review.rating);
    const product = ProductCatalog.getAvailable().find(p => p.id === parseInt(review.productId));
    const productName = product ? product.name : 'Unknown Product';
    
    return `
      <div class="review-card">
        <div class="review-stars">${stars}</div>
        <p class="review-text">"${review.text}"</p>
        <div class="review-author">
          <strong>${review.name}</strong>
          <span class="review-date">on ${productName}</span>
        </div>
      </div>
    `;
  }).join('');
}

// Load collection reviews on page load
document.addEventListener('DOMContentLoaded', () => {
  loadCollectionReviews();
});

// Handle search and filter
function handleSearch() {
  const searchInput = document.getElementById('searchInput').value.toLowerCase();
  const categoryFilter = document.getElementById('categoryFilter').value;
  const materialFilter = document.getElementById('materialFilter').value;
  const clearBtn = document.querySelector('.search-clear');
  
  // Show/hide clear button
  clearBtn.style.display = searchInput ? 'block' : 'none';
  
  const allProducts = ProductCatalog.getAvailable();
  
  const filteredProducts = allProducts.filter(product => {
    // Search text filter
    const matchesSearch = !searchInput || 
      product.name.toLowerCase().includes(searchInput) ||
      product.material.toLowerCase().includes(searchInput) ||
      product.category.toLowerCase().includes(searchInput) ||
      product.description.toLowerCase().includes(searchInput);
    
    // Category filter
    const matchesCategory = !categoryFilter || product.category === categoryFilter;
    
    // Material filter
    const matchesMaterial = !materialFilter || product.material === materialFilter;
    
    return matchesSearch && matchesCategory && matchesMaterial;
  });
  
  loadProducts(filteredProducts);
}

// Clear search
function clearSearch() {
  document.getElementById('searchInput').value = '';
  handleSearch();
}

// Initialize on page load
document.addEventListener('DOMContentLoaded', async () => {
  await loadProducts();
});
</script>
