<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdn.emailjs.com https://www.google.com https://www.gstatic.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://yytxrapemcsloyuqewhf.supabase.co https://api.emailjs.com;">
<title>Verify Email — FL Sculptures</title>
<meta name="description" content="Verify your email address for FL Sculptures account">
<meta name="robots" content="noindex, nofollow">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page-transition"></div>

<header>
  <button class="menu-toggle">Menu</button>
  <div class="header-actions">
    <div class="auth-buttons">
      <button class="sign-in-btn">Sign In</button>
      <button class="sign-up-btn">Sign Up</button>
    </div>
    <div class="user-menu" style="display: none;">
      <span class="user-name"></span>
      <button class="sign-out-btn">Sign Out</button>
      <a href="account.html" class="my-account-btn">My Account</a>
    </div>
    <button class="cart-toggle">
      <span class="cart-text">Cart</span>
      <span class="cart-count">(0)</span>
    </button>
  </div>
</header>

<div class="cart-sidebar">
  <div class="cart-header">
    <h3>Cart</h3>
    <button class="close-cart">×</button>
  </div>
  <div class="cart-items"></div>
  <div class="cart-footer">
    <div class="cart-total-row">
      <span>Total</span>
      <span class="cart-total">0.00 €</span>
    </div>
    <button class="checkout-btn">Checkout</button>
  </div>
</div>

<!-- Authentication Modal -->
<div class="auth-overlay" id="authModal" style="display: none;">
  <div class="auth-modal">
    <button class="auth-close">×</button>
    <div class="auth-tabs">
      <button class="auth-tab active" data-mode="signin">Sign In</button>
      <button class="auth-tab" data-mode="signup">Sign Up</button>
    </div>
    
    <form id="signinForm" class="auth-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required>
      </div>
      <button type="submit" class="auth-submit-btn">Sign In</button>
      
      <div class="auth-footer">
        <a href="#" onclick="window.authSystem.showAuthModal('reset'); return false;">Forgot password?</a>
      </div>
      
      <div class="social-login">
        <p>Or continue with</p>
        <button type="button" class="google-login">
          <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Sign in with Google
        </button>
        <button type="button" class="apple-login">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.74.84 0 2.17-.93 3.63-.8 1.25.1 2.22.62 2.92 1.48-2.6 1.57-2.16 5.5.63 6.74zM13 5.49c.73-.83 1.94-1.46 2.94-1.5c.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
          Sign in with Apple
        </button>
      </div>
    </form>
    
    <form id="signupForm" class="auth-form" style="display: none;">
      <div class="form-group">
        <label>First Name</label>
        <input type="text" name="firstName" required>
      </div>
      <div class="form-group">
        <label>Last Name</label>
        <input type="text" name="lastName" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required minlength="6">
      </div>
      <button type="submit" class="auth-submit-btn">Create Account</button>
      
      <div class="social-login">
        <p>Or sign up with</p>
        <button type="button" class="google-login">
          <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Sign up with Google
        </button>
        <button type="button" class="apple-login">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.74.84 0 2.17-.93 3.63-.8 1.25.1 2.22.62 2.92 1.48-2.6 1.57-2.16 5.5.63 6.74zM13 5.49c.73-.83 1.94-1.46 2.94-1.5c.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
          Sign up with Apple
        </button>
      </div>
    </form>
  </div>
</div>

<div class="page-hero">
  <div class="eyebrow">Account</div>
  <h1>Email Verification</h1>
</div>

<section class="reveal">
  <div class="auth-container">
    <div id="verificationResult">
      <p>Verifying your email...</p>
    </div>
  </div>
</section>

<footer id="site-footer"></footer>

<script src="cart.js"></script>
<script src="auth.js"></script>
<script src="i18n.js"></script>
<script src="main.js"></script>
<script>
// Verify email on page load
document.addEventListener('DOMContentLoaded', () => {
  const urlParams = new URLSearchParams(window.location.search);
  const token = urlParams.get('token');
  const email = urlParams.get('email');
  const resultDiv = document.getElementById('verificationResult');
  
  if (!token || !email) {
    resultDiv.innerHTML = `
      <div class="error-message">
        <h3>Invalid Verification Link</h3>
        <p>The verification link is incomplete. Please check your email for the complete link or request a new verification email.</p>
        <button class="checkout-btn" onclick="window.location.href='index.html'">Return Home</button>
      </div>
    `;
    return;
  }
  
  if (window.authSystem) {
    const result = window.authSystem.verifyEmail(token, email);
    
    if (result.success) {
      resultDiv.innerHTML = `
        <div class="success-message">
          <h3>Email Verified Successfully!</h3>
          <p>Your email has been verified. You can now enjoy all features of your account.</p>
          <button class="checkout-btn" onclick="window.location.href='account.html'">Go to My Account</button>
        </div>
      `;
    } else {
      resultDiv.innerHTML = `
        <div class="error-message">
          <h3>Verification Failed</h3>
          <p>${result.message}</p>
          <button class="secondary-btn" onclick="resendVerification('${email}')">Resend Verification Email</button>
          <button class="secondary-btn" onclick="window.location.href='index.html'">Return Home</button>
        </div>
      `;
    }
  } else {
    resultDiv.innerHTML = `
      <div class="error-message">
        <h3>Authentication System Not Available</h3>
        <p>Please refresh the page and try again.</p>
      </div>
    `;
  }
});

function resendVerification(email) {
  if (window.authSystem) {
    const result = window.authSystem.resendVerificationEmail(email);
    if (result.success) {
      alert('Verification email has been sent to ' + email);
    } else {
      alert(result.message);
    }
  }
}
</script>
</body>
</html>
