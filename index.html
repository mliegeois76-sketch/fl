<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdn.emailjs.com https://www.google.com https://www.gstatic.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://yytxrapemcsloyuqewhf.supabase.co https://api.emailjs.com;">
<title>FL</title>
<link rel="icon" type="image/jpeg" href="logo.jpg">
<meta name="description" content="FL — Sculptures d'art contemporain minimaliste.">
<meta name="keywords" content="sculptures, art contemporain, art minimaliste">
<meta name="author" content="FL">
<meta name="robots" content="index, follow">
<meta property="og:title" content="FL">
<meta property="og:description" content="Sculptures d'art contemporain minimaliste.">
<meta property="og:type" content="website">
<meta property="og:locale" content="fr_FR">
<link rel="stylesheet" href="style.css">
<style>
  .hero-video-wrap {
    position: relative;
    width: 100%;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
  }

  .hero-video-wrap video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top;
    filter: grayscale(0.85) sepia(0.15) contrast(1.05);
  }

  .hero-video-wrap::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(180deg, rgba(20,18,15,0.05) 0%, rgba(20,18,15,0.3) 100%);
  }

  .hero-content {
    position: absolute;
    inset: 0;
    z-index: 1;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: flex-start;
    text-align: left;
    padding: 60px;
  }

  header {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 2;
    background: transparent;
  }

  .menu-toggle {
    background: none;
    border: 1px solid var(--line);
    padding: 8px 16px;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--white);
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .menu-toggle:hover {
    border-color: var(--bronze);
    color: var(--bronze);
  }

  .menu-toggle,
  .sign-in-btn,
  .sign-up-btn,
  .cart-toggle,
  .lang-switcher {
    background: none !important;
    border: none !important;
    padding: 0 !important;
    box-shadow: none !important;
    color: var(--white) !important;
  }

  .menu-toggle:hover,
  .sign-in-btn:hover,
  .sign-up-btn:hover,
  .cart-toggle:hover {
    color: var(--bronze) !important;
    opacity: 0.8;
  }

  header .header-actions {
    display: flex;
    align-items: center;
    gap: 32px;
  }

  .bottom-blur {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 80px;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    border-top: 1px solid var(--line);
    z-index: 2;
  }

  .main-content {
    padding: 0;
  }

  .hero-subtitle {
    font-size: 10px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
    margin-bottom: 16px;
    opacity: 0;
    transform: translateY(30px);
    animation: fadeInUp 1.5s ease 0.9s forwards;
  }
  
  .hero-cta {
    position: absolute;
    bottom: 60px;
    right: 60px;
    margin-top: 0;
    opacity: 0;
    transform: translateY(30px);
    animation: fadeInUp 1.5s ease 1.1s forwards;
  }
  
  .cta-button {
    display: inline-block;
    padding: 0;
    border: none;
    background: none;
    color: rgba(255,255,255,0.7);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-decoration: none;
    border-bottom: 1px solid rgba(255,255,255,0.3);
    padding-bottom: 3px;
    transition: all 0.3s ease;
  }
  
  .cta-button:hover {
    color: var(--white);
    border-color: var(--white);
    background: none;
    transform: none;
  }
  
  @keyframes fadeInUp {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  
  @keyframes fadeIn {
    to { opacity: 1; }
  }
  
  /* Page transition overlay */
  .page-transition {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: var(--white);
    z-index: 9999;
    pointer-events: none;
    clip-path: circle(0% at 50% 50%);
    transition: clip-path 0.8s cubic-bezier(0.65, 0, 0.35, 1);
  }
  
  .page-transition.active {
    clip-path: circle(150% at 50% 50%);
  }
  
  /* Navigation link hover effect */
  #mainNav a {
    position: relative;
    overflow: hidden;
  }
  
  #mainNav a::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 1px;
    background: var(--ink);
    transform: translateX(-100%);
    transition: transform 0.4s cubic-bezier(0.65, 0, 0.35, 1);
  }
  
  #mainNav a:hover::after {
    transform: translateX(0);
  }
  
  /* Section content styles */
  .section-content {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    padding: 120px 5vw 60px;
  }
  
  .page-hero {
    text-align: center;
    margin-bottom: 60px;
  }
  
  .page-hero h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(40px, 8vw, 80px);
    font-weight: 300;
    margin-bottom: 16px;
  }
  
  .page-hero p {
    color: var(--stone);
    font-size: 16px;
  }
  
  /* Manifesto styles */
  .manifesto-grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 60px;
    max-width: 900px;
  }
  
  .manifesto-grid .big {
    font-size: 24px;
    line-height: 1.6;
    font-weight: 300;
  }
  
  .manifesto-grid .side p {
    font-size: 14px;
    line-height: 1.8;
    color: var(--stone);
    margin-bottom: 24px;
  }
  
  /* Contact styles */
  .contact-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
    max-width: 900px;
  }
  
  .form-row {
    margin-bottom: 24px;
  }
  
  .form-row label {
    display: block;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
    color: var(--stone);
  }
  
  .form-row input,
  .form-row textarea {
    width: 100%;
    padding: 12px;
    border: 1px solid var(--line);
    background: transparent;
    font-family: inherit;
    font-size: 14px;
    transition: border-color 0.3s ease;
  }
  
  .form-row input:focus,
  .form-row textarea:focus {
    outline: none;
    border-color: var(--ink);
  }
  
  .submit-btn {
    padding: 12px 32px;
    border: 1px solid var(--ink);
    background: transparent;
    color: var(--ink);
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  
  .submit-btn:hover {
    background: var(--ink);
    color: var(--white);
  }
  
  .form-status {
    margin-top: 16px;
    font-size: 14px;
  }
  
  .form-status.success {
    color: var(--stone);
  }
  
  .form-status.error {
    color: #d32f2f;
  }
  
  .contact-info .block {
    padding: 24px;
    border: 1px solid var(--line);
    margin-bottom: 24px;
  }
  
  .contact-info .eyebrow {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--stone);
    margin-bottom: 8px;
  }
  
  @media (max-width: 760px) {
    .manifesto-grid,
    .contact-grid {
      grid-template-columns: 1fr;
      gap: 40px;
    }
    
    .piece-grid {
      grid-template-columns: 1fr;
    }
  }
  
  /* Header layout */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 40px;
  }
  
  .cart-text {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  
  .cart-count {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  
</style>
</head>
<body>

<svg style="position:fixed;inset:0;width:0;height:0;">
  <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2"/></filter>
</svg>
<div class="grain-overlay"></div>

<div class="page-transition"></div>

<header>
  <button class="menu-toggle">Menu</button>
  <div class="header-actions">
    <div class="auth-buttons">
      <button class="sign-in-btn" data-i18n="auth.signIn">Connexion</button>
      <button class="sign-up-btn" data-i18n="auth.signUp">Inscription</button>
    </div>
    <div class="user-menu" style="display: none;">
      <span class="user-name"></span>
      <button class="sign-out-btn" data-i18n="auth.signOut">Déconnexion</button>
      <a href="account.html" class="my-account-btn" data-i18n="auth.myAccount">Mon compte</a>
    </div>
    <button class="cart-toggle">
      <span class="cart-text" data-i18n="cart.title">Panier</span>
      <span class="cart-count">(0)</span>
      <span class="cart-count-badge">0</span>
    </button>
    <div class="lang-selector">
      <button class="lang-toggle">
        <span class="current-lang">FR</span>
        <span class="lang-arrow">▼</span>
      </button>
      <div class="lang-menu" id="langMenu">
        <a href="#" class="lang-option active" data-lang="fr">Français</a>
        <a href="#" class="lang-option" data-lang="en">English</a>
      </div>
    </div>
  </div>
</header>

<!-- Menu Overlay -->
<div class="menu-overlay" id="menuOverlay">
  <div class="menu-content">
    <button class="menu-close">×</button>
    <nav class="menu-nav"></nav>
  </div>
</div>

<!-- Authentication Modal -->
<div class="auth-overlay" id="authModal" style="display: none;">
  <div class="auth-modal">
    <button class="auth-close">×</button>
    <div class="auth-tabs">
      <button class="auth-tab active" data-mode="signin" data-i18n="auth.signIn">Connexion</button>
      <button class="auth-tab" data-mode="signup" data-i18n="auth.signUp">Inscription</button>
    </div>

    <form id="signinForm" class="auth-form">
      <div class="form-group">
        <label data-i18n="auth.email">Email</label>
        <input type="email" name="email" required>
      </div>
      <div class="form-group">
        <label data-i18n="auth.password">Mot de passe</label>
        <input type="password" name="password" required>
      </div>
      <button type="submit" class="auth-submit-btn" data-i18n="auth.signIn">Se connecter</button>

      <div class="social-login">
        <p data-i18n="auth.orContinueWith">Ou continuer avec</p>
        <button type="button" class="google-login">
          <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continuer avec Google
        </button>
        <button type="button" class="apple-login">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.74.84 0 2.17-.93 3.63-.8 1.25.1 2.22.62 2.92 1.48-2.6 1.57-2.16 5.5.63 6.74zM13 5.49c.73-.83 1.94-1.46 2.94-1.5c.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
          Continuer avec Apple
        </button>
      </div>
    </form>
    
    <form id="signupForm" class="auth-form" style="display: none;">
      <div class="form-group">
        <label data-i18n="auth.firstName">Prénom</label>
        <input type="text" name="firstName" required>
      </div>
      <div class="form-group">
        <label data-i18n="auth.lastName">Nom</label>
        <input type="text" name="lastName" required>
      </div>
      <div class="form-group">
        <label data-i18n="auth.email">Email</label>
        <input type="email" name="email" required>
      </div>
      <div class="form-group">
        <label data-i18n="auth.password">Mot de passe</label>
        <input type="password" name="password" required minlength="6">
      </div>
      <button type="submit" class="auth-submit-btn" data-i18n="auth.createAccount">Créer un compte</button>

      <div class="social-login">
        <p data-i18n="auth.orSignUpWith">Ou s'inscrire avec</p>
        <button type="button" class="google-login">
          <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          S'inscrire avec Google
        </button>
        <button type="button" class="apple-login">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.74.84 0 2.17-.93 3.63-.8 1.25.1 2.22.62 2.92 1.48-2.6 1.57-2.16 5.5.63 6.74zM13 5.49c.73-.83 1.94-1.46 2.94-1.5c.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
          S'inscrire avec Apple
        </button>
      </div>
    </form>
  </div>
</div>

<div class="cart-sidebar">
  <div class="cart-header">
    <h3 data-i18n="cart.title">Panier</h3>
    <button class="close-cart">×</button>
  </div>
  <div class="cart-items"></div>
  <div class="cart-footer">
    <div class="cart-total-row">
      <span data-i18n="cart.total">Total</span>
      <span class="cart-total">0.00 €</span>
    </div>
    <button class="checkout-btn" data-i18n="cart.checkout">Commander</button>
  </div>
</div>

<div class="hero-video-wrap">
  <video autoplay muted loop playsinline poster="logo.jpg">
    <source src="hero-ocean-new.mp4" type="video/mp4">
  </video>
  <div class="hero-content" id="hero-content">
    <div class="hero-cta">
      <a href="collection.html" class="cta-button">Découvrir la collection</a>
    </div>
    <p class="hero-subtitle">Sculptures — Collection 2026</p>
  </div>
</div>

<div class="content-wrapper">
  <main class="main-content">
  </main>
</div>

<footer id="site-footer"></footer>
