<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FL</title>
<link rel="icon" type="image/jpeg" href="logo.jpg">
<meta name="description" content="FL — Sculptures d'art contemporain minimaliste.">
<meta name="keywords" content="sculptures, art contemporain, art minimaliste">
<meta name="author" content="FL">
<meta name="robots" content="index, follow">
<meta property="og:title" content="FL">
<meta property="og:description" content="Sculptures d'art contemporain minimaliste.">
<meta property="og:type" content="website">
<meta property="og:locale" content="fr_FR">
<link rel="stylesheet" href="style.css">
<style>
  .hero-content {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 0 5vw;
  }
  
  .hero-video-wrap {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden;
  }

  .hero-video-wrap video {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .hero-video-wrap::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.28);
  }

  .hero-content {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 0 5vw;
  }

  .hero-title {
    font-family: 'Fraunces', serif;
    font-size: clamp(80px, 15vw, 200px);
    font-weight: 300;
    letter-spacing: 0.1em;
    color: var(--white);
    margin-bottom: 24px;
    opacity: 0;
    transform: translateY(30px);
    animation: fadeInUp 1.5s ease forwards;
  }
  
  .hero-subtitle {
    font-size: clamp(14px, 2vw, 18px);
    color: var(--white);
    max-width: 500px;
    line-height: 1.6;
    opacity: 0;
    transform: translateY(30px);
    animation: fadeInUp 1.5s ease 0.3s forwards;
  }
  
  .hero-cta {
    margin-top: 48px;
    opacity: 0;
    transform: translateY(30px);
    animation: fadeInUp 1.5s ease 0.6s forwards;
  }
  
  .cta-button {
    display: inline-block;
    padding: 16px 48px;
    border: 1px solid var(--white);
    background: transparent;
    color: var(--white);
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-decoration: none;
    transition: all 0.4s ease;
  }
  
  .cta-button:hover {
    background: var(--white);
    color: var(--ink);
    transform: scale(1.05);
  }
  
  @keyframes fadeInUp {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  
  .scroll-indicator {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    opacity: 0;
    animation: fadeIn 1s ease 1s forwards;
  }
  
  .scroll-indicator span {
    display: block;
    width: 1px;
    height: 60px;
    background: var(--white);
    margin: 0 auto;
    animation: scrollDown 2s ease infinite;
  }
  
  @keyframes fadeIn {
    to { opacity: 1; }
  }
  
  @keyframes scrollDown {
    0%, 100% { transform: scaleY(0); transform-origin: top; }
    50% { transform: scaleY(1); transform-origin: top; }
    51% { transform-origin: bottom; }
  }
  
  /* Page transition overlay */
  .page-transition {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: var(--white);
    z-index: 9999;
    pointer-events: none;
    clip-path: circle(0% at 50% 50%);
    transition: clip-path 0.8s cubic-bezier(0.65, 0, 0.35, 1);
  }
  
  .page-transition.active {
    clip-path: circle(150% at 50% 50%);
  }
  
  /* Navigation link hover effect */
  #mainNav a {
    position: relative;
    overflow: hidden;
  }
  
  #mainNav a::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 1px;
    background: var(--ink);
    transform: translateX(-100%);
    transition: transform 0.4s cubic-bezier(0.65, 0, 0.35, 1);
  }
  
  #mainNav a:hover::after {
    transform: translateX(0);
  }
  
  /* Section content styles */
  .section-content {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    padding: 120px 5vw 60px;
  }
  
  .page-hero {
    text-align: center;
    margin-bottom: 60px;
  }
  
  .page-hero h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(40px, 8vw, 80px);
    font-weight: 300;
    margin-bottom: 16px;
  }
  
  .page-hero p {
    color: var(--stone);
    font-size: 16px;
  }
  
  /* Manifesto styles */
  .manifesto-grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 60px;
    max-width: 900px;
  }
  
  .manifesto-grid .big {
    font-size: 24px;
    line-height: 1.6;
    font-weight: 300;
  }
  
  .manifesto-grid .side p {
    font-size: 14px;
    line-height: 1.8;
    color: var(--stone);
    margin-bottom: 24px;
  }
  
  /* Contact styles */
  .contact-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
    max-width: 900px;
  }
  
  .form-row {
    margin-bottom: 24px;
  }
  
  .form-row label {
    display: block;
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
    color: var(--stone);
  }
  
  .form-row input,
  .form-row textarea {
    width: 100%;
    padding: 12px;
    border: 1px solid var(--line);
    background: transparent;
    font-family: inherit;
    font-size: 14px;
    transition: border-color 0.3s ease;
  }
  
  .form-row input:focus,
  .form-row textarea:focus {
    outline: none;
    border-color: var(--ink);
  }
  
  .submit-btn {
    padding: 12px 32px;
    border: 1px solid var(--ink);
    background: transparent;
    color: var(--ink);
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  
  .submit-btn:hover {
    background: var(--ink);
    color: var(--white);
  }
  
  .form-status {
    margin-top: 16px;
    font-size: 14px;
  }
  
  .form-status.success {
    color: var(--stone);
  }
  
  .form-status.error {
    color: #d32f2f;
  }
  
  .contact-info .block {
    padding: 24px;
    border: 1px solid var(--line);
    margin-bottom: 24px;
  }
  
  .contact-info .eyebrow {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--stone);
    margin-bottom: 8px;
  }
  
  @media (max-width: 760px) {
    .manifesto-grid,
    .contact-grid {
      grid-template-columns: 1fr;
      gap: 40px;
    }
    
    .piece-grid {
      grid-template-columns: 1fr;
    }
  }
  
  /* Header layout */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 40px;
  }
  
  .cart-text {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  
  .cart-count {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  
</style>
</head>
<body>

<div class="page-transition"></div>

<header>
  <button class="menu-toggle">Menu</button>
  <div class="header-actions">
    <div class="auth-buttons">
      <button class="sign-in-btn" data-i18n="auth.signIn">Connexion</button>
      <button class="sign-up-btn" data-i18n="auth.signUp">Inscription</button>
    </div>
    <div class="user-menu" style="display: none;">
      <span class="user-name"></span>
      <button class="sign-out-btn" data-i18n="auth.signOut">Déconnexion</button>
      <a href="account.html" class="my-account-btn" data-i18n="auth.myAccount">Mon compte</a>
    </div>
    <button class="cart-toggle">
      <span class="cart-text" data-i18n="cart.title">Panier</span>
      <span class="cart-count">(0)</span>
      <span class="cart-count-badge">0</span>
    </button>
    <div class="lang-selector">
      <button class="lang-toggle">
        <span class="current-lang">FR</span>
        <span class="lang-arrow">▼</span>
      </button>
      <div class="lang-menu" id="langMenu">
        <a href="#" class="lang-option active" data-lang="fr">Français</a>
        <a href="#" class="lang-option" data-lang="en">English</a>
      </div>
    </div>
  </div>
</header>

<!-- Menu Overlay -->
<div class="menu-overlay" id="menuOverlay">
  <div class="menu-content">
    <button class="menu-close">×</button>
    <nav class="menu-nav"></nav>
  </div>
</div>

<!-- Authentication Modal -->
<div class="auth-overlay" id="authModal" style="display: none;">
  <div class="auth-modal">
    <button class="auth-close">×</button>
    <div class="auth-tabs">
      <button class="auth-tab active" data-mode="signin" data-i18n="auth.signIn">Connexion</button>
      <button class="auth-tab" data-mode="signup" data-i18n="auth.signUp">Inscription</button>
    </div>

    <form id="signinForm" class="auth-form">
      <div class="form-group">
        <label data-i18n="auth.email">Email</label>
        <input type="email" name="email" required>
      </div>
      <div class="form-group">
        <label data-i18n="auth.password">Mot de passe</label>
        <input type="password" name="password" required>
      </div>
      <button type="submit" class="auth-submit-btn" data-i18n="auth.signIn">Se connecter</button>

      <div class="social-login">
        <p data-i18n="auth.orContinueWith">Ou continuer avec</p>
        <button type="button" class="google-login">
          <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Continuer avec Google
        </button>
        <button type="button" class="apple-login">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.74.84 0 2.17-.93 3.63-.8 1.25.1 2.22.62 2.92 1.48-2.6 1.57-2.16 5.5.63 6.74zM13 5.49c.73-.83 1.94-1.46 2.94-1.5c.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
          Continuer avec Apple
        </button>
      </div>
    </form>
    
    <form id="signupForm" class="auth-form" style="display: none;">
      <div class="form-group">
        <label data-i18n="auth.firstName">Prénom</label>
        <input type="text" name="firstName" required>
      </div>
      <div class="form-group">
        <label data-i18n="auth.lastName">Nom</label>
        <input type="text" name="lastName" required>
      </div>
      <div class="form-group">
        <label data-i18n="auth.email">Email</label>
        <input type="email" name="email" required>
      </div>
      <div class="form-group">
        <label data-i18n="auth.password">Mot de passe</label>
        <input type="password" name="password" required minlength="6">
      </div>
      <button type="submit" class="auth-submit-btn" data-i18n="auth.createAccount">Créer un compte</button>

      <div class="social-login">
        <p data-i18n="auth.orSignUpWith">Ou s'inscrire avec</p>
        <button type="button" class="google-login">
          <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          S'inscrire avec Google
        </button>
        <button type="button" class="apple-login">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.74.84 0 2.17-.93 3.63-.8 1.25.1 2.22.62 2.92 1.48-2.6 1.57-2.16 5.5.63 6.74zM13 5.49c.73-.83 1.94-1.46 2.94-1.5c.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
          S'inscrire avec Apple
        </button>
      </div>
    </form>
  </div>
</div>

<div class="cart-sidebar">
  <div class="cart-header">
    <h3 data-i18n="cart.title">Panier</h3>
    <button class="close-cart">×</button>
  </div>
  <div class="cart-items"></div>
  <div class="cart-footer">
    <div class="cart-total-row">
      <span data-i18n="cart.total">Total</span>
      <span class="cart-total">0.00 €</span>
    </div>
    <button class="checkout-btn" data-i18n="cart.checkout">Commander</button>
  </div>
</div>

<div class="content-wrapper">
  <main class="main-content">
    <div class="hero-video-wrap">
      <video autoplay muted loop playsinline poster="logo.jpg">
        <source src="hero-ocean.mp4" type="video/mp4">
      </video>
      <div class="hero-content" id="hero-content">
      <h1 class="hero-title">FL</h1>
      <p class="hero-subtitle">Sculptures d'art contemporain minimaliste. Une démarche artistique entre tradition et contemporanéité.</p>
      <div class="hero-cta">
        <a href="collection.html" class="cta-button">Découvrir la collection</a>
      </div>
      <div class="scroll-indicator">
        <span></span>
      </div>
    </div>
  </main>
</div>

<div style="height: 200px;"></div>

<footer id="site-footer"></footer>

<script src="cart.js"></script>
<script src="auth.js"></script>
<script src="i18n.js"></script>
<script src="main.js"></script>
</body>
</html>
