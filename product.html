<script>
// Load product details from URL parameter
function loadProductDetails() {
  const urlParams = new URLSearchParams(window.location.search);
  const productId = urlParams.get('id');
  
  if (!productId) {
    window.location.href = 'collection.html';
    return;
  }
  
  const product = ProductCatalog.getById(productId);
  
  if (!product) {
    document.getElementById('productTitle').textContent = 'Product Not Found';
    document.getElementById('productCategory').textContent = '';
    document.getElementById('productDescription').textContent = 'The requested product could not be found.';
    return;
  }
  
  // Update page content
  document.getElementById('productTitle').textContent = product.name;
  document.getElementById('productCategory').textContent = product.category;
  document.getElementById('productPrice').textContent = product.price.toFixed(2) + ' €';
  document.getElementById('productStock').textContent = product.stock > 0 ? product.stock + ' in stock' : 'Out of stock';
  document.getElementById('productStock').className = 'stock-badge ' + (product.stock > 0 ? 'in-stock' : 'out-of-stock');
  
  // Display product rating
  const rating = ProductCatalog.getProductRating(product.id);
  const ratingDisplay = document.getElementById('productRating');
  if (rating.count > 0) {
    ratingDisplay.innerHTML = `
      <div class="rating-stars">${'★'.repeat(Math.round(rating.average))}${'☆'.repeat(5 - Math.round(rating.average))}</div>
      <div class="rating-count">${rating.count} review${rating.count !== 1 ? 's' : ''}</div>
      <div class="rating-average">${rating.average} out of 5</div>
    `;
  } else {
    ratingDisplay.innerHTML = '<div class="no-reviews">No reviews yet</div>';
  }
  
  document.getElementById('productDescription').textContent = product.description;
  document.getElementById('productMaterial').textContent = product.material;
  document.getElementById('productDimensions').textContent = product.dimensions;
  document.getElementById('productWeight').textContent = product.weight;
  document.getElementById('productCategoryValue').textContent = product.category;
  
  // Update add to cart button
  const addToCartBtn = document.getElementById('addToCartBtn');
  if (product.stock > 0) {
    addToCartBtn.disabled = false;
    addToCartBtn.textContent = 'Add to Cart';
    addToCartBtn.onclick = function() {
      if (window.shoppingCart) {
        window.shoppingCart.addToCart(product.id, product.name, product.price, product.image);
      }
    };
  } else {
    addToCartBtn.disabled = true;
    addToCartBtn.textContent = 'Out of Stock';
  }
}

// Initialize on page load
document.addEventListener('DOMContentLoaded', () => {
  loadProductDetails();
  
  // Initialize SEO for product page
  if (typeof SEOService !== 'undefined') {
    SEOService.trackPageView('product');
  }
});
</script>
