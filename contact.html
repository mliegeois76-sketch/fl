<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — FL Sculptures</title>
<meta name="description" content="Contactez FL pour toute demande concernant nos sculptures, réservations d'œuvres ou visites d'atelier.">
<meta name="keywords" content="contact sculpture, réservation œuvre, visite atelier, demande information">
<meta name="author" content="FL">
<meta name="robots" content="index, follow">
<meta property="og:title" content="Contact — FL Sculptures">
<meta property="og:description" content="Contactez FL pour toute demande concernant nos sculptures.">
<meta property="og:type" content="website">
<meta property="og:locale" content="fr_FR">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page-transition"></div>

<header>
  <button class="menu-toggle">Menu</button>
  <div class="header-actions">
    <div class="lang-dropdown">
      <button class="lang-current" onclick="toggleLangDropdown()">FR</button>
      <div class="lang-menu" id="langMenu">
        <button onclick="setLanguage('fr')">FR</button>
        <button onclick="setLanguage('en')">EN</button>
        <button onclick="setLanguage('zh')">ZH</button>
        <button onclick="setLanguage('es')">ES</button>
        <button onclick="setLanguage('pt')">PT</button>
      </div>
    </div>
    <button class="cart-toggle" onclick="window.shoppingCart.toggleCart()">
      <span class="cart-text">Panier</span>
      <span class="cart-count">(0)</span>
    </button>
  </div>
</header>

<!-- Menu Overlay -->
<div class="menu-overlay" id="menuOverlay">
  <div class="menu-content">
    <button class="menu-close">×</button>
    <nav class="menu-nav">
      <a href="index.html">Accueil</a>
      <a href="collection.html">Collection</a>
      <a href="about.html">À propos</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
  </div>
</div>

<div class="cart-sidebar">
  <div class="cart-header">
    <h3>Panier</h3>
    <button class="close-cart" onclick="window.shoppingCart.closeCart()">×</button>
  </div>
  <div class="cart-items"></div>
  <div class="cart-footer">
    <div class="cart-total-row">
      <span>Total</span>
      <span class="cart-total">0.00 €</span>
    </div>
    <button class="checkout-btn" onclick="window.location.href='checkout.html'">Commander</button>
  </div>
</div>

<div class="page-hero">
  <div class="eyebrow">Contact</div>
  <h1>Nous écrire</h1>
  <p class="placeholder">[Texte d'intro contact — à confirmer]</p>
</div>

<section class="contact reveal">
  <div class="contact-grid">
    <form id="contactForm" novalidate>
      <div class="form-row"><label for="name">Nom</label><input id="name" name="name" type="text" required autocomplete="name"></div>
      <div class="form-row"><label for="email">Email</label><input id="email" name="email" type="email" required autocomplete="email"></div>
      <div class="form-row"><label for="oeuvre">Œuvre concernée (optionnel)</label><input id="oeuvre" name="oeuvre" type="text" placeholder="Titre de l'œuvre"></div>
      <div class="form-row"><label for="message">Message</label><textarea id="message" name="message" required></textarea></div>
      <p class="form-status" id="formStatus" role="status" aria-live="polite"></p>
      <button class="submit-btn" type="submit">Envoyer</button>
    </form>
    <div class="contact-info">
      <div class="block"><span class="eyebrow">Atelier</span><p class="placeholder">[Adresse ou "sur rendez-vous uniquement" — à confirmer]</p></div>
      <div class="block"><span class="eyebrow">Contact direct</span><p class="placeholder">[Email]<br>[Téléphone — optionnel]</p></div>
      <div class="block"><span class="eyebrow">Réseaux</span><p class="placeholder">[Instagram / autre — à confirmer]</p></div>
    </div>
  </div>
</section>

<footer id="site-footer"></footer>

<script src="cart.js"></script>
<script src="i18n.js"></script>
<script src="main.js"></script>
<script src="config.js"></script>
<script>
// Language dropdown toggle
function toggleLangDropdown() {
  const langMenu = document.getElementById('langMenu');
  langMenu.classList.toggle('active');
}

// Connect dropdown to existing i18n system
document.addEventListener('DOMContentLoaded', () => {
  const langButtons = document.querySelectorAll('#langMenu button');
  langButtons.forEach(btn => {
    btn.addEventListener('click', (e) => {
      const lang = e.target.textContent.toLowerCase();
      if (window.i18n) {
        window.i18n.setLanguage(lang);
        const langCurrent = document.querySelector('.lang-current');
        langCurrent.textContent = lang.toUpperCase();
      }
    });
  });
});

</script>
</body>
</html>
